services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka-broker:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  ingestion:
    build: .
    depends_on:
      - kafka-broker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker:29092
    command: python -m services.ingestion.main

  processing:
    build: .
    depends_on:
      - kafka-broker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker:29092
    volumes:
      - ./services/storage/logs:/app/services/storage/logs
    command: python -m services.processing.main

  storage:
    build: .
    depends_on:
      - kafka-broker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker:29092
    volumes:
      - ./services/storage/logs:/app/services/storage/logs
    command: python -m services.storage.trend_save

  dashboard:
    build: ./services/dashboard
    ports:
      - "8080:80"
    volumes:
      - ./services/storage/logs:/usr/share/nginx/html/storage/logs